<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقييم مادة تقنية المعلومات - مدرسة محمد بن سليمان الغافري</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        header h1 { color: var(--primary-color); font-size: 1.5rem; }
        header p { color: #666; margin-bottom: 30px; }

        .rating-box { margin: 20px 0; }
        
        /* نظام النجوم */
        .stars {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 10px;
        }

        .stars input { display: none; }

        .stars label {
            font-size: 40px;
            color: #ddd;
            cursor: pointer;
            transition: color 0.2s;
        }

        .stars input:checked ~ label,
        .stars label:hover,
        .stars label:hover ~ label {
            color: #f1c40f;
        }

        select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            box-sizing: border-box;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        button:hover { background-color: #2980b9; }

        #message { margin-top: 20px; font-weight: bold; color: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>مدرسة محمد بن سليمان الغافري</h2>
        <h1>تقييم مادة تقنية المعلومات</h1>
        <p>رأيك يهمنا لتطوير المادة (التقييم مجهول الهوية)</p>
    </header>

    <form id="evaluationForm">
        <label for="topic">اختر الموضوع المراد تقييمه:</label>
        <select id="topic" required>
            <option value="">-- اختر الدرس/المشروع --</option>
            <option value="programming">البرمجة بلغة بايثون</option>
            <option value="web-design">تصميم المواقع</option>
            <option value="robotics">الروبوت والذكاء الاصطناعي</option>
            <option value="security">الأمن السيبراني</option>
        </select>

        <div class="rating-box">
            <p>ما هو تقييمك العام؟</p>
            <div class="stars">
                <input type="radio" name="star" id="star5" value="5"><label for="star5">★</label>
                <input type="radio" name="star" id="star4" value="4"><label for="star4">★</label>
                <input type="radio" name="star" id="star3" value="3"><label for="star3">★</label>
                <input type="radio" name="star" id="star2" value="2"><label for="star2">★</label>
                <input type="radio" name="star" id="star1" value="1"><label for="star1">★</label>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwq1ek70aHRMy3aqXxzwZcmFs0K7qMJCLc6H2pWcoZApVicKsXbZ1AKx7HGpN2cL7df/exec'; 
    const form = document.getElementById('evaluationForm');
    const msg = document.getElementById('message');

    form.addEventListener('submit', e => {
        e.preventDefault();
        msg.innerText = "جاري إرسال تقييمك...";

        // تجهيز البيانات للإرسال
        const formData = new FormData();
        formData.append('topic', document.getElementById('topic').value);
        formData.append('rating', document.querySelector('input[name="star"]:checked').value);
        formData.append('comment', document.getElementById('comment').value);

        fetch(scriptURL, { method: 'POST', body: formData})
            .then(response => {
                msg.innerText = "شكراً لك! تم استلام تقييمك في مدرسة محمد بن سليمان الغافري.";
                form.reset();
            })
            .catch(error => {
                msg.innerText = "عذراً، حدث خطأ أثناء الإرسال. حاول مرة أخرى.";
                console.error('Error!', error.message);
            });
    });
</script>
